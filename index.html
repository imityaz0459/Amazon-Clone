
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
   <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
   
</head>
<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border">
                <div class="logo"></div>
            </div>
            <div class="nav-location border">
                <p> Deliver to</p>
                <div class="location">
                   <i class="fa-solid fa-location-dot"></i>
                    <strong>India</strong>
                </div>
            </div>
            <div class="nav-search">
               <select class="all-list">
                <option >All</option>
               </select>
                
               <input type="text" placeholder="Search Amazon" class="search-input">
                <div class="search-icon">
                 <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
<!--        Flag section is pending here will do it later -->

            <div class="nav-account border">
                <P class="account-para">Hello, sign in</P>
                <select class="account-list ">
                    <option > Account & Lists</option>
                </select>
            </div>

            <div class="nav-order border">
                <p class="order-para">Returns</p>
                <strong>&Orders</strong>
            </div>
            
            <div class="nav-cart border">
                
                <i class="fa-solid fa-cart-shopping"></i>

                 <p>Cart</p>
            </div>


        </div>
    </header>
</body>
</html>
